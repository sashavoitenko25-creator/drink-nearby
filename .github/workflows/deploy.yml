name: Deploy Drink Nearby WebApp


on:
  push:
    branches:
      - main


permissions:
  contents: write


jobs:

  deploy:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Deploy WebApp
        uses: peaceiris/actions-gh-pages@v4
        with:

          github_token: ${{ secrets.GITHUB_TOKEN }}

          publish_dir: ./webapp

          publish_branch: gh-pages